<!-- ═══ VERO ADMIN — DASHBOARD ═══ -->
<div class="vc-app">

  <!-- ─── SIDEBAR ─── -->
  <aside class="vc-nav">
    <div class="vc-brand">
      <span class="vc-mark">V</span>
      <span class="vc-brand-word">ero</span>
    </div>

    <nav class="vc-nav-list">
      <button [class.active]="isActive('users')" routerLink="/admin/users">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Overview</span>
      </button>
      <button [class.active]="isActive('messages')" routerLink="/admin/messages">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Conversations</span>
      </button>
      <button [class.active]="isActive('products')" routerLink="/admin/products">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Products</span>
      </button>
      <button [class.active]="isActive('formations')" routerLink="/admin/formations">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>Trainings</span>
      </button>
    </nav>

    <div class="vc-nav-foot">
      @if (adminMe) {
        <div class="vc-me">
          <div class="vc-me-avatar">{{ initials(adminMe.fullName) }}</div>
          <div class="vc-me-body">
            <strong>{{ adminMe.fullName }}</strong>
            <small>{{ adminMe.email }}</small>
          </div>
        </div>
      }
      <button class="vc-signout" (click)="logout()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <main class="vc-main">

    <!-- TOP BAR -->
    @if (currentSection !== 'messages') {
      <header class="vc-topbar">
        <div class="vc-topbar-left">
          <h1 class="vc-page-title" [innerHTML]="heroTitle"></h1>
          <p class="vc-page-sub">{{ heroSub }}</p>
        </div>
        <div class="vc-topbar-right">
          @if (currentSection === 'users' || currentSection === 'add' || currentSection === 'edit') {
            <button class="vc-btn accent" routerLink="/admin/users/new">+ New user</button>
          }
        </div>
      </header>
    }

    <!-- ROUTED CONTENT -->
    <div class="vc-content" [class.vc-content-msg]="currentSection === 'messages'">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
