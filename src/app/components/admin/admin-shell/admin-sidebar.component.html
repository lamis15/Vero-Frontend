<aside class="vc-nav">

  <div class="vc-brand">
    <div class="nav-logo" routerLink="/" aria-label="Vero home">
      Ver<span class="logo-accent">o</span>
    </div>
  </div>

  <nav class="vc-nav-list">
    <button id="nav-btn-dashboard" class="vc-nav-item"
      routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}"
      [routerLink]="['/admin/dashboard']" title="Dashboard">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 13l9-9 9 9"/><path d="M5 11v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
      </svg>
    </button>

    <button id="nav-btn-users" class="vc-nav-item"
      routerLinkActive="active"
      [routerLink]="['/admin/users']" title="Users">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5" />
        <rect x="14" y="3" width="7" height="7" rx="1.5" />
        <rect x="3" y="14" width="7" height="7" rx="1.5" />
        <rect x="14" y="14" width="7" height="7" rx="1.5" />
      </svg>
    </button>

    <button id="nav-btn-products" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/products']" title="Products">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10H3M16 2l5 8-9 12-9-12 5-8" />
        <path d="M12 2v20" />
      </svg>
    </button>

    <button id="nav-btn-formations" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/formations']" title="Trainings">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
        <path d="M6 12v5c3 3 9 3 12 0v-5" />
      </svg>
    </button>

    <button id="nav-btn-forum" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/forum']" title="Community">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L21 3z" />
      </svg>
    </button>

    <button id="nav-btn-eco-map" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/eco-map/moderation']" title="Map Moderation">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
        <circle cx="12" cy="10" r="3" />
      </svg>
    </button>

    <button id="nav-btn-messages" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/messages']" title="Conversations">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
    </button>
  </nav>

  <div class="vc-nav-foot">
    @if (admin) {
      <div class="vc-nav-avatar" [title]="admin.fullName">
        {{ initial(admin.fullName) }}
      </div>
    }
    <button id="nav-btn-logout" class="vc-nav-item vc-nav-logout" (click)="logout.emit()" title="Sign out">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </div>
</aside>
