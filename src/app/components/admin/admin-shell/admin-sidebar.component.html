<aside class="vc-nav">

  <div class="vc-brand">
    <div class="nav-logo" routerLink="/" aria-label="Vero home">
      Ver<span class="logo-accent">o</span>
    </div>
  </div>

  <nav class="vc-nav-list">

    <button id="nav-btn-dashboard" class="vc-nav-item"
      routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      [routerLink]="['/admin/dashboard']" title="Dashboard">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 13l9-9 9 9"/>
        <path d="M5 11v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
      </svg>
    </button>

    <button id="nav-btn-users" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/users']" title="Users">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5" />
        <rect x="14" y="3" width="7" height="7" rx="1.5" />
        <rect x="3" y="14" width="7" height="7" rx="1.5" />
        <rect x="14" y="14" width="7" height="7" rx="1.5" />
      </svg>
    </button>

    <button id="nav-btn-products" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/products']" title="Products">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10H3M16 2l5 8-9 12-9-12 5-8" />
        <path d="M12 2v20" />
      </svg>
    </button>

    <button id="nav-btn-formations" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/formations']" title="Trainings">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
        <path d="M6 12v5c3 3 9 3 12 0v-5" />
      </svg>
    </button>

    <button id="nav-btn-events" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/events']" title="Events">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
        <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01" />
      </svg>
    </button>

    <button id="nav-btn-bookings" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/reservations']" title="Reservations">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2h12a2 2 0 0 1 2 2v18l-3-2-3 2-3-2-3 2-3-2-3 2V4a2 2 0 0 1 2-2z" />
        <path d="M8 7h8" />
        <path d="M8 11h8" />
        <path d="M8 15h5" />
        <path d="M16 15l1.5 1.5L21 13" />
      </svg>
    </button>

    <button id="nav-btn-anomaly" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/anomaly']" title="Anomaly Detector">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V6a3 3 0 0 0-3-3H9z" />
        <path d="M9 8h6" />
        <path d="M9 12h6" />
        <path d="M9 16h4" />
        <path d="M17.5 16.5 19 18l2.5-3" />
      </svg>
    </button>

    <button id="nav-btn-forum" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/forum']" title="Community">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 0 0 1 3.8.9L21 3z" />
      </svg>

    <button id="nav-btn-eco-map" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/eco-map/moderation']" title="Map Moderation">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
        <circle cx="12" cy="10" r="3" />
      </svg>
    </button>

    <button id="nav-btn-messages" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/messages']" title="Conversations">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
    </button>

    <button id="nav-btn-petitions" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/petitions']" title="Petitions">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="3" width="14" height="18" rx="2" />
        <path d="M9 7h6" />
        <path d="M9 11h6" />
        <path d="M9 15h4" />
      </svg>
    </button>

    <button id="nav-btn-donations" class="vc-nav-item"
      routerLinkActive="active" [routerLink]="['/admin/donations']" title="Donations">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9" />
        <path d="M12 7v10" />
        <path d="M9 10c0-1.4 1.3-2.4 3-2.4s3 1 3 2.4c0 1.6-1.5 2-3 2s-3 .5-3 2 1.3 2.4 3 2.4 3-1 3-2.4" />
      </svg>
    </button>

  </nav>

  <div class="vc-nav-foot">
    @if (admin) {
      <div class="vc-nav-avatar" [title]="admin.fullName">
        {{ initial(admin.fullName) }}
      </div>
    }

    <button id="nav-btn-logout" class="vc-nav-item vc-nav-logout" (click)="logout.emit()" title="Sign out">
      <svg class="vc-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </div>
