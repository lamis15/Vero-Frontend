<div class="chat-page">
  <div class="chat-layout">
    <aside class="chat-sessions">
      <div class="sessions-head">
        <h2>Chat Sessions</h2>
        <button type="button" (click)="newSession()">+ New</button>
      </div>
      @for (s of sessions; track s.id) {
        <div class="session-item" [class.active]="activeSessionId === s.id" (click)="selectSession(s.id)">
          <span>Session #{{ s.id }}</span>
          <button type="button" class="delete" (click)="deleteSession(s.id); $event.stopPropagation()">x</button>
        </div>
      }
    </aside>

    <div class="chat-main">
      <div class="chat-intro">
        <h1 class="chat-title">Eco assistant</h1>
    
      </div>
      
      @if (error) {
        <div class="error">{{ error }}</div>
      }
      <div class="messages">
        @if (loading) {
          <p>Loading messages...</p>
        } @else if (!activeSessionId) {
          <p>Create or select a session to start chatting.</p>
        } @else {
          @for (m of messages; track m.id) {
            <div class="msg" [class.bot]="m.sender === 'BOT'" [class.user]="m.sender === 'USER'">
              <span class="msg-body">{{ m.content }}</span>
            </div>
          }
        }
      </div>

      <div class="composer">
        <input
          type="text"
          [(ngModel)]="messageText"
          placeholder="Type your message..."
          (keyup.enter)="sendMessage()"
        />
        <button type="button" (click)="sendMessage()" [disabled]="!wsConnected || loading">Send</button>
      </div>
    </div>
  </div>
</div>
