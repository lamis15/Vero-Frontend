<div class="events-page">

  <div class="toast-notif" *ngIf="successMsg">✨ {{ successMsg }}</div>

  <header class="hero-container">
    <span class="tagline">Green Community —</span>
    <h1 class="hero-title">Manage your<br><span class="italic-green">impact</span></h1>
  </header>

  <!-- FAB button for Admin/Partner -->
  <button class="fab-add" *ngIf="canManage()" (click)="openCreate()" title="Créer un événement">+</button>

  <div class="grid-container">
    <article class="event-card" *ngFor="let ev of events">

      <div class="card-media">
        <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=800" alt="Nature">
        <div class="date-overlay">
          <span class="day">{{ ev.startDate | date:'dd' }}</span>
          <span class="month">{{ ev.startDate | date:'MMM' }}</span>
        </div>
      </div>

      <div class="card-body">
        <span class="category-tag">● {{ ev.status }}</span>
        <h3 class="event-title">{{ ev.title }}</h3>
        <p class="event-desc">{{ ev.description }}</p>

        <div class="event-stats-bar">
          <span>📍 {{ ev.location }}</span>
          <span>👥 {{ ev.capacity }} places</span>
        </div>

        <footer class="card-footer">
          <!-- Join button for regular users -->
          <button class="btn-join" *ngIf="isUser()" (click)="joinEvent(ev.id!)">
            Join Now
          </button>

          <!-- Edit / Delete for Admin and Partner -->
          <div class="admin-quick-actions" *ngIf="canManage()">
            <button class="btn-icon-alt" (click)="openEdit(ev)" title="Modifier">✏️</button>
            <button class="btn-icon-alt delete" (click)="deleteEvent(ev.id!)" title="Supprimer">🗑️</button>
          </div>
        </footer>
      </div>

    </article>
  </div>

  <!-- MODAL ADD / EDIT -->
  <div class="modal-backdrop" *ngIf="showModal">
    <div class="modal-window">

      <h2 style="margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
        {{ editMode ? 'Modifier l\'événement' : 'Nouvel événement' }}
        <button class="btn-link" (click)="showModal = false">✕</button>
      </h2>

      <div class="modal-form">
        <label>Titre *</label>
        <input [(ngModel)]="form.title" name="title" placeholder="Ex: Nettoyage côtier">

        <label>Description</label>
        <textarea [(ngModel)]="form.description" name="description" rows="3" placeholder="Brève description..."></textarea>

        <div class="form-row">
          <div>
            <label>Lieu</label>
            <input [(ngModel)]="form.location" name="location" placeholder="Ville">
          </div>
          <div>
            <label>Capacité</label>
            <input type="number" [(ngModel)]="form.capacity" name="capacity" placeholder="50">
          </div>
        </div>

        <div class="form-row">
          <div>
            <label>Début *</label>
            <input type="datetime-local" [(ngModel)]="form.startDate" name="startDate">
          </div>
          <div>
            <label>Fin *</label>
            <input type="datetime-local" [(ngModel)]="form.endDate" name="endDate">
          </div>
        </div>
      </div>

      <div class="modal-footer-btns">
        <button class="btn-link" (click)="showModal = false">Annuler</button>
        <button class="btn-submit-main" (click)="submitForm()">
          {{ editMode ? 'Mettre à jour' : 'Créer' }}
        </button>
      </div>

    </div>
  </div>

</div>
